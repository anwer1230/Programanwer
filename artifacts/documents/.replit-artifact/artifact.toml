kind = "web"
previewPath = "/documents/"
title = "Documents"
version = "1.0.0"
id = "artifacts/documents"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/documents/" ]
localPort = 18141

[services.development]
run = "pnpm --filter @workspace/documents run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/documents", "run", "build" ]
publicDir = "artifacts/documents/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18141"
BASE_PATH = "/documents/"
