openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Documents project API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document operations
  - name: folders
    description: Folder operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /folders:
    get:
      operationId: listFolders
      tags: [folders]
      summary: List all folders
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Folder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderInput"
      responses:
        "201":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"

  /folders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getFolder
      tags: [folders]
      summary: Get a folder
      responses:
        "200":
          description: Folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "404":
          description: Not found
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Update a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderUpdate"
      responses:
        "200":
          description: Updated folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "404":
          description: Not found
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete a folder
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: folderId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: starred
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /documents/{id}/star:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: toggleDocumentStar
      tags: [documents]
      summary: Toggle star on a document
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get document statistics
      responses:
        "200":
          description: Document stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStats"

  /documents/recent:
    get:
      operationId: getRecentDocuments
      tags: [documents]
      summary: Get recently modified documents
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Recent documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Folder:
      type: object
      required: [id, name, color, documentCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        documentCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FolderInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    FolderUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    Document:
      type: object
      required: [id, title, content, starred, folderId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        starred:
          type: boolean
        folderId:
          type: ["integer", "null"]
        folderName:
          type: ["string", "null"]
        folderColor:
          type: ["string", "null"]
        wordCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DocumentInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        folderId:
          type: ["integer", "null"]

    DocumentUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        folderId:
          type: ["integer", "null"]

    DocumentStats:
      type: object
      required: [totalDocuments, totalFolders, starredCount, wordCount]
      properties:
        totalDocuments:
          type: integer
        totalFolders:
          type: integer
        starredCount:
          type: integer
        wordCount:
          type: integer
        byFolder:
          type: array
          items:
            type: object
            required: [folderId, folderName, folderColor, count]
            properties:
              folderId:
                type: ["integer", "null"]
              folderName:
                type: ["string", "null"]
              folderColor:
                type: ["string", "null"]
              count:
                type: integer
